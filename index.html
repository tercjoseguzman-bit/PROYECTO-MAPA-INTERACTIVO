<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo Paraná</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
/* Tooltip estilo terminal */
.tech-tooltip {
    background-color: rgba(255, 255, 255, 0.95) !important; /* Fondo blanco casi opaco */
    backdrop-filter: blur(4px); /* Desenfoque de fondo sutil */
    color: #1a1a1a !important; /* Texto gris muy oscuro, casi negro */
    border: none !important; /* Sin bordes */
    border-radius: 8px !important; /* Esquinas redondeadas suaves */
    padding: 8px 14px !important;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    letter-spacing: 0.3px !important;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15) !important; /* Sombra suave y profunda */
}

/* Quitar la flechita clásica del tooltip para un look más limpio */
.leaflet-tooltip-top:before, 
.leaflet-tooltip-bottom:before, 
.leaflet-tooltip-left:before, 
.leaflet-tooltip-right:before {
    display: none !important;
}

.leaflet-interactive {
    transition: fill 0.3s ease, fill-opacity 0.3s ease, stroke 0.3s ease, stroke-width 0.3s ease;
}

/* Botones flotantes estilo "Interface de Usuario" */
.btn-accion {
    padding: 12px 24px;
    background: rgba(0, 40, 80, 0.7);
    color: #00d4ff;
    border: 1px solid #00d4ff;
    border-radius: 4px;
    backdrop-filter: blur(8px); /* Efecto cristal */
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.4s;
}

.btn-accion:hover {
    background: #00d4ff;
    color: #001428;
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
    transform: scale(1.05);
}

/* Scrollbar para la tabla (para que no rompa la estética) */
#vista-tabla::-webkit-scrollbar {
    width: 8px;
}
#vista-tabla::-webkit-scrollbar-thumb {
    background: #00d4ff;
    border-radius: 4px;
}


        .botones-flotantes {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-accion {
            padding: 12px 20px; background: white; border: 2px solid #333;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s;
        }

        #vista-tabla {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; padding: 30px; box-sizing: border-box; overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #333; color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; }

        /* Estilos para los botones dentro del popup */
        .popup-btn {
            width: 100%; margin-top: 5px; padding: 8px;
            background: #f8f9fa; border: 1px solid #ddd;
            border-radius: 4px; cursor: pointer; text-align: left;
        }
        .popup-btn:hover { background: #e9ecef; }
        .popup-header { border-bottom: 1px solid #ccc; margin-bottom: 8px; padding-bottom: 4px; }
        .filtros-tabla {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            align-items: flex-end;
        }
        .filtros-tabla label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            color: #333;
        }
        .filtros-tabla select {
            margin-top: 4px;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            min-width: 180px;
            background: white;
        }
    </style>
</head>
<body>

    <div class="botones-flotantes">
        <button class="btn-accion" id="btn-ver-tabla">Banco de Dados</button>
        <a class="btn-accion" id="btn-sugerencia" href="https://forms.gle/REEMPLAZA_CON_TU_LINK" target="_blank" rel="noopener noreferrer">Sugerir uma atualização</a>
    </div>

    <div id="map"></div>

    <div id="vista-tabla">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Banco de Dados</h2>
            <button class="btn-accion" id="btn-volver-mapa">Volver al Mapa</button>
        </div>
        <div class="filtros-tabla">
            <label>Estado
                <select id="filtro-estado">
                    <option value="">Todos</option>
                </select>
            </label>
            <label>Município
                <select id="filtro-municipio">
                    <option value="">Todos</option>
                </select>
            </label>
            <label>Categoría geral
                <select id="filtro-categoria">
                    <option value="">Todos</option>
                </select>
            </label>
        </div>
        <table id="tabla-datos">
            <thead>
    <tr>
        <th>Estado</th>
        <th>Municipio</th>
        <th>Categoría</th>
        <th>Sub-Categoría</th>
        <th>Organización</th>
        <th>Localización</th>
        <th>Nombre/Contacto</th>
        <th>Celular</th>
        <th>E-mail</th>
        <th>Sitio Web</th>
    </tr>
</thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-25.4, -49.2], 7);

        var CartoDB_VoyagerLabelsUnder = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
	attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
	subdomains: 'abcd',
	maxZoom: 20
}).addTo(map);

        let datosGlobal = [];
        const normalizar = (t) => t?.toString().trim().toLowerCase();

        // Carga de datos
        Promise.all([
            fetch('parana.json').then(res => res.json()),
            fetch('datos.json').then(res => res.json())
        ]).then(([geoData, datos]) => {
            datosGlobal = datos;

         L.geoJSON(geoData, {
    style: {
        color: "#0960ae",      // Borde azul tecnológico
        weight: 1,
        fillColor: "#64a6e3",  // Azul base
        fillOpacity: 0.4
    },
    onEachFeature: function (feature, layer) {
        const nombreMun = feature.properties.name;

        // EVENTO AL PASAR EL MOUSE
        layer.on('mouseover', function (e) {
            // Aplicamos el estilo resaltado (la transición CSS hará el resto)
            this.setStyle({ 
                fillOpacity: 0.8, 
                fillColor: "#1e3a8a", 
                weight: 2,
                color: "#ffffff" 
            });

            // ACTIVAR EL TOOLTIP (Aquí estaba el fallo)
            layer.bindTooltip(nombreMun, {
                sticky: true,
                direction: 'top',
                offset: [0, -10],
                className: 'tech-tooltip'
            }).openTooltip();
        });

        // EVENTO AL QUITAR EL MOUSE
        layer.on('mouseout', function (e) {
            this.setStyle({ 
                fillOpacity: 0.4,
                fillColor: "#64a6e3",
                weight: 1,
                color: "#0960ae" 
            });
        });

        // EVENTO AL HACER CLICK
        layer.on('click', function (e) {
            mostrarCategorias(nombreMun, e.latlng);
        });
    }
}).addTo(map);
        });

        // NIVEL 1: Categoría Geral
        function mostrarCategorias(municipio, latlng) {
            const filtrados = datosGlobal.filter(d => normalizar(d["Município"]) === normalizar(municipio));
            let cats = [...new Set(filtrados.map(f => f["Categoria geral"]))].filter(Boolean);
            
            let html = `<div class="popup-header"><b>${municipio}</b></div>`;
            if(cats.length > 0) {
                cats.forEach(cat => {
                    html += `<button class="popup-btn" onclick="mostrarSubcats('${municipio}', '${cat}', '${latlng.lat},${latlng.lng}')">${cat}</button>`;
                });
            } else { html += "Sin datos."; }
            
            L.popup().setLatLng(latlng).setContent(html).openOn(map);
        }

        // NIVEL 2: Sub-categoría
        window.mostrarSubcats = function(mun, cat, coords) {
            const filtrados = datosGlobal.filter(d => 
                normalizar(d["Município"]) === normalizar(mun) && d["Categoria geral"] === cat
            );
            let subcats = [...new Set(filtrados.map(f => f["Sub-categoria"]))].filter(Boolean);
            
            let html = `<div class="popup-header"><b>${mun}</b> > ${cat}</div>`;
            subcats.forEach(sub => {
                html += `<button class="popup-btn" onclick="mostrarOrgLista('${mun}', '${cat}', '${sub}', '${coords}')">${sub}</button>`;
            });
            
            const ll = coords.split(',');
            L.popup().setLatLng([ll[0], ll[1]]).setContent(html).openOn(map);
        };

        // NIVEL 3: Lista de Organizaciones como botones
        window.mostrarOrgLista = function(mun, cat, sub, coords) {
            const filtrados = datosGlobal.filter(d => 
                normalizar(d["Município"]) === normalizar(mun) && 
                d["Categoria geral"] === cat && 
                d["Sub-categoria"] === sub
            );

            let html = `<div class="popup-header"><b>Organizaciones:</b></div>`;
            filtrados.forEach((org, index) => {
                // Usamos el index para identificar la organización exacta
                const nombreEscapado = org["Organização"].replace(/'/g, "\\'"); 
        html += `<button class="popup-btn" onclick="mostrarDetalleFinal('${nombreEscapado}', '${coords}')">🏢 ${org["Organização"]}</button>`;
            });

            const ll = coords.split(',');
            L.popup().setLatLng([ll[0], ll[1]]).setContent(html).openOn(map);
        };

        // NIVEL 4: Detalle de Columnas 16, 17, 18 y 19
       // CAMBIO: Ahora el primer parámetro se llama nombreOrg
window.mostrarDetalleFinal = function(nombreOrg, coords) {
    const org = datosGlobal.find(d => d["Organização"] === nombreOrg);
    if (!org) return;

    let html = `<div class="popup-header"><b>Detalles: ${org["Organização"]}</b></div>`;
    html += `<div style="font-size:12px; line-height:1.4;">`;
    html += `<b>Local:</b> ${org["Local"] || 'N/A'}<br>`;
    html += `<b>Contacto:</b> ${org["Nome / Contato"] || 'N/A'}<br>`;
    html += `<b>Cel:</b> ${org["Cel"] || 'N/A'}<br>`;
    html += `<b>E-mail:</b> ${org["E-mail"] || 'N/A'}<br>`;
    html += `<b>Web:</b> ${org["Site"] || 'N/A'}`;
    html += `</div>`;

    const ll = coords.split(',');
    L.popup().setLatLng([ll[0], ll[1]]).setContent(html).openOn(map);
};

        const filtroEstado = document.getElementById('filtro-estado');
        const filtroMunicipio = document.getElementById('filtro-municipio');
        const filtroCategoria = document.getElementById('filtro-categoria');

        function llenarSelect(select, opciones) {
            select.innerHTML = '<option value="">Todos</option>' + opciones.map(o => `<option value="${o}">${o}</option>`).join('');
        }

        function cargarFiltros(datos) {
            const estados = [...new Set(datos.map(d => d["Estado"]).filter(Boolean))].sort();
            const municipios = [...new Set(datos.map(d => d["Município"]).filter(Boolean))].sort();
            const categorias = [...new Set(datos.map(d => d["Categoria geral"]).filter(Boolean))].sort();

            llenarSelect(filtroEstado, estados);
            llenarSelect(filtroMunicipio, municipios);
            llenarSelect(filtroCategoria, categorias);
        }

        function actualizarMunicipios() {
            const estado = filtroEstado.value;
            const municipios = [...new Set(datosGlobal
                .filter(d => !estado || d["Estado"] === estado)
                .map(d => d["Município"]).filter(Boolean))].sort();
            const seleccionActual = filtroMunicipio.value;
            llenarSelect(filtroMunicipio, municipios);
            if (municipios.includes(seleccionActual)) {
                filtroMunicipio.value = seleccionActual;
            }
        }

        function aplicarFiltros() {
            const estado = filtroEstado.value;
            const municipio = filtroMunicipio.value;
            const categoria = filtroCategoria.value;

            let datosFiltrados = datosGlobal;
            if (estado) datosFiltrados = datosFiltrados.filter(d => d["Estado"] === estado);
            if (municipio) datosFiltrados = datosFiltrados.filter(d => d["Município"] === municipio);
            if (categoria) datosFiltrados = datosFiltrados.filter(d => d["Categoria geral"] === categoria);

            renderizarTabla(datosFiltrados);
        }

        function renderizarTabla(datos) {
    const cuerpo = document.querySelector('#tabla-datos tbody');
    cuerpo.innerHTML = "";
    
    datos.forEach(d => {
        const fila = document.createElement('tr');
        
        // El orden visual de las 10 columnas según tus nombres:
        fila.innerHTML = `
            <td>${d["Estado"] || '-'}</td>
            <td>${d["Município"] || '-'}</td>
            <td>${d["Categoria geral"] || '-'}</td>
            <td>${d["Sub-categoria"] || '-'}</td>
            <td><b>${d["Organização"] || '-'}</b></td>
            <td>${d["Local"] || '-'}</td>
            <td>${d["Nome / Contato"] || '-'}</td>
            <td>${d["Cel"] || '-'}</td>
            <td>${d["E-mail"] || '-'}</td>
            <td>${d["Site"] || '-'}</td>
        `;
        cuerpo.appendChild(fila);
    });
}

        filtroEstado.addEventListener('change', () => {
            actualizarMunicipios();
            aplicarFiltros();
        });
        filtroMunicipio.addEventListener('change', aplicarFiltros);
        filtroCategoria.addEventListener('change', aplicarFiltros);

        document.getElementById('btn-ver-tabla').onclick = () => {
            document.getElementById('vista-tabla').style.display = 'block';
            cargarFiltros(datosGlobal);
            renderizarTabla(datosGlobal);
        };
        document.getElementById('btn-volver-mapa').onclick = () => {
            document.getElementById('vista-tabla').style.display = 'none';
        };
    </script>
</body>
</html>
