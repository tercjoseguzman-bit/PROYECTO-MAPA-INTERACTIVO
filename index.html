<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo Paraná</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .botones-flotantes {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-accion {
            padding: 12px 20px; background: white; border: 2px solid #333;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s;
        }

        #vista-tabla {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; padding: 30px; box-sizing: border-box; overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #333; color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; }

        /* Estilos para los botones dentro del popup */
        .popup-btn {
            width: 100%; margin-top: 5px; padding: 8px;
            background: #f8f9fa; border: 1px solid #ddd;
            border-radius: 4px; cursor: pointer; text-align: left;
        }
        .popup-btn:hover { background: #e9ecef; }
        .popup-header { border-bottom: 1px solid #ccc; margin-bottom: 8px; padding-bottom: 4px; }
    </style>
</head>
<body>

    <div class="botones-flotantes">
        <button class="btn-accion" id="btn-ver-tabla">Ver Base de Datos</button>
    </div>

    <div id="map"></div>

    <div id="vista-tabla">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Base de Datos</h2>
            <button class="btn-accion" id="btn-volver-mapa">⬅ Volver al Mapa</button>
        </div>
        <table id="tabla-datos">
            <thead>
    <tr>
        <th>Estado</th>
        <th>Municipio</th>
        <th>Categoría</th>
        <th>Sub-Categoría</th>
        <th>Organización</th>
        <th>Localización</th>
        <th>Nombre/Contacto</th>
        <th>Celular</th>
        <th>E-mail</th>
        <th>Sitio Web</th>
    </tr>
</thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-25.4, -49.2], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let datosGlobal = [];
        const normalizar = (t) => t?.toString().trim().toLowerCase();

        // Carga de datos
        Promise.all([
            fetch('parana.json').then(res => res.json()),
            fetch('datos.json').then(res => res.json())
        ]).then(([geoData, datos]) => {
            datosGlobal = datos;

            L.geoJSON(geoData, {
                style: { color: "#3388ff", weight: 2, fillOpacity: 0.2 },
                onEachFeature: function (feature, layer) {
                    const nombreMun = feature.properties.name;

                    // EFECTO HOVER
                    layer.on('mouseover', function (e) {
                        this.setStyle({ fillOpacity: 0.5, weight: 3 });
                        layer.bindTooltip(nombreMun).openTooltip();
                    });

                    layer.on('mouseout', function (e) {
                        this.setStyle({ fillOpacity: 0.2, weight: 2 });
                    });

                    // CLICK INICIAL
                    layer.on('click', function (e) {
                        mostrarCategorias(nombreMun, e.latlng);
                    });
                }
            }).addTo(map);
        });

        // NIVEL 1: Categoría Geral
        function mostrarCategorias(municipio, latlng) {
            const filtrados = datosGlobal.filter(d => normalizar(d["Município"]) === normalizar(municipio));
            let cats = [...new Set(filtrados.map(f => f["Categoria geral"]))].filter(Boolean);
            
            let html = `<div class="popup-header"><b>${municipio}</b></div>`;
            if(cats.length > 0) {
                cats.forEach(cat => {
                    html += `<button class="popup-btn" onclick="mostrarSubcats('${municipio}', '${cat}', '${latlng.lat},${latlng.lng}')">${cat}</button>`;
                });
            } else { html += "Sin datos."; }
            
            L.popup().setLatLng(latlng).setContent(html).openOn(map);
        }

        // NIVEL 2: Sub-categoría
        window.mostrarSubcats = function(mun, cat, coords) {
            const filtrados = datosGlobal.filter(d => 
                normalizar(d["Município"]) === normalizar(mun) && d["Categoria geral"] === cat
            );
            let subcats = [...new Set(filtrados.map(f => f["Sub-categoria"]))].filter(Boolean);
            
            let html = `<div class="popup-header"><b>${mun}</b> > ${cat}</div>`;
            subcats.forEach(sub => {
                html += `<button class="popup-btn" onclick="mostrarOrgLista('${mun}', '${cat}', '${sub}', '${coords}')">${sub}</button>`;
            });
            
            const ll = coords.split(',');
            L.popup().setLatLng([ll[0], ll[1]]).setContent(html).openOn(map);
        };

        // NIVEL 3: Lista de Organizaciones como botones
        window.mostrarOrgLista = function(mun, cat, sub, coords) {
            const filtrados = datosGlobal.filter(d => 
                normalizar(d["Município"]) === normalizar(mun) && 
                d["Categoria geral"] === cat && 
                d["Sub-categoria"] === sub
            );

            let html = `<div class="popup-header"><b>Organizaciones:</b></div>`;
            filtrados.forEach((org, index) => {
                // Usamos el index para identificar la organización exacta
                const nombreEscapado = org["Organização"].replace(/'/g, "\\'"); 
        html += `<button class="popup-btn" onclick="mostrarDetalleFinal('${nombreEscapado}', '${coords}')">🏢 ${org["Organização"]}</button>`;
            });

            const ll = coords.split(',');
            L.popup().setLatLng([ll[0], ll[1]]).setContent(html).openOn(map);
        };

        // NIVEL 4: Detalle de Columnas 16, 17, 18 y 19
       // CAMBIO: Ahora el primer parámetro se llama nombreOrg
window.mostrarDetalleFinal = function(nombreOrg, coords) {
    const org = datosGlobal.find(d => d["Organização"] === nombreOrg);
    if (!org) return;

    let html = `<div class="popup-header"><b>Detalles: ${org["Organização"]}</b></div>`;
    html += `<div style="font-size:12px; line-height:1.4;">`;
    html += `<b>Local:</b> ${org["Local"] || 'N/A'}<br>`;
    html += `<b>Contacto:</b> ${org["Nome / Contato"] || 'N/A'}<br>`;
    html += `<b>Cel:</b> ${org["Cel"] || 'N/A'}<br>`;
    html += `<b>E-mail:</b> ${org["E-mail"] || 'N/A'}<br>`;
    html += `<b>Web:</b> ${org["Site"] || 'N/A'}`;
    html += `</div>`;

    const ll = coords.split(',');
    L.popup().setLatLng([ll[0], ll[1]]).setContent(html).openOn(map);
};

        // RENDER DE TABLA (ORGANIZACIÓN EN 6ta COLUMNA)
        function renderizarTabla(datos) {
    const cuerpo = document.querySelector('#tabla-datos tbody');
    cuerpo.innerHTML = "";
    
    datos.forEach(d => {
        const fila = document.createElement('tr');
        
        // El orden visual de las 10 columnas según tus nombres:
        fila.innerHTML = `
            <td>${d["Estado"] || '-'}</td>
            <td>${d["Município"] || '-'}</td>
            <td>${d["Categoria geral"] || '-'}</td>
            <td>${d["Sub-categoria"] || '-'}</td>
            <td><b>${d["Organização"] || '-'}</b></td>
            <td>${d["Local"] || '-'}</td>
            <td>${d["Nome / Contato"] || '-'}</td>
            <td>${d["Cel"] || '-'}</td>
            <td>${d["E-mail"] || '-'}</td>
            <td>${d["Site"] || '-'}</td>
        `;
        cuerpo.appendChild(fila);
    });
}

        document.getElementById('btn-ver-tabla').onclick = () => {
            document.getElementById('vista-tabla').style.display = 'block';
            renderizarTabla(datosGlobal);
        };
        document.getElementById('btn-volver-mapa').onclick = () => {
            document.getElementById('vista-tabla').style.display = 'none';
        };
    </script>
</body>
</html>
